services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securevps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securevps_pass}
      POSTGRES_DB: ${POSTGRES_DB:-securevps_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securevps}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
